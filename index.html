<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MAURO BONOTTO / Editor</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>

    <header class="navbar">
        <div class="navbar-container">
            <button class="menu-toggle" id="menuToggle" aria-label="Abrir menú">
                <span class="bar"></span>
                <span class="bar"></span>
                <span class="bar"></span>
            </button>
            <h1 class="brand-title">MAURO BONOTTO / Editor</h1>
            <nav class="nav-links">
                <a href="#" id="btnReel">Reel</a>
                <a href="#contacto">Contacto</a>
            </nav>
        </div>
    </header>

    <div class="sidebar-menu" id="sidebarMenu">
        <nav class="sidebar-nav">
            <a href="#documentales" class="sidebar-link">DOCUMENTALES</a>
            <a href="#ficcion" class="sidebar-link">FICCIÓN</a>
            <a href="#trailers" class="sidebar-link">TRAILERS</a>
            <a href="#comerciales" class="sidebar-link">COMERCIALES</a>
            <a href="#asistencia" class="sidebar-link">ASISTENCIA DE EDICIÓN</a>
            <a href="#videoclips" class="sidebar-link">VIDEOCLIPS</a>
        </nav>
    </div>
    <div class="menu-overlay" id="menuOverlay"></div>

    <main class="portfolio-container" id="grilla-proyectos">
        <section id="documentales" class="category-section">
            <h2 class="category-title">DOCUMENTALES</h2>
            <div class="projects-grid" id="grid-documentales"></div>
        </section>

        <section id="ficcion" class="category-section">
            <h2 class="category-title">FICCIÓN</h2>
            <div class="projects-grid" id="grid-ficcion"></div>
        </section>

        <section id="trailers" class="category-section">
            <h2 class="category-title">TRAILERS</h2>
            <div class="projects-grid" id="grid-trailers"></div>
        </section>

        <section id="comerciales" class="category-section">
            <h2 class="category-title">COMERCIALES</h2>
            <div class="projects-grid" id="grid-comerciales"></div>
        </section>

        <section id="asistencia" class="category-section">
            <h2 class="category-title">ASISTENCIA DE EDICIÓN</h2>
            <div class="projects-grid" id="grid-asistencia"></div>
        </section>

        <section id="videoclips" class="category-section">
            <h2 class="category-title">VIDEOCLIPS</h2>
            <div class="projects-grid" id="grid-videoclips"></div>
        </section>
    </main>

    <footer id="contacto" class="contact-section">
        <div class="contact-content">
            <p>maurobonotto@gmail.com</p>
            <p>+54 11 4090 8258</p>
        </div>
    </footer>

    <div class="modal" id="videoModal">
        <button class="modal-close" id="modalClose">&times;</button>
        <button class="nav-arrow prev" id="prevVideo">&#10094;</button>
        <div class="modal-content" id="modalContent"></div>
        <button class="nav-arrow next" id="nextVideo">&#10095;</button>
    </div>

    <script>
        let currentVideoIndex = 0;
        let currentVideoList = [];

        document.addEventListener('DOMContentLoaded', () => {
            const menuToggle = document.getElementById('menuToggle');
            const sidebarMenu = document.getElementById('sidebarMenu');
            const menuOverlay = document.getElementById('menuOverlay');
            const sidebarLinks = document.querySelectorAll('.sidebar-link');

            function toggleMenu() {
                sidebarMenu.classList.toggle('active');
                menuOverlay.classList.toggle('active');
                menuToggle.classList.toggle('open');
            }

            menuToggle.addEventListener('click', toggleMenu);
            menuOverlay.addEventListener('click', toggleMenu);
            sidebarLinks.forEach(link => link.addEventListener('click', toggleMenu));

            document.getElementById('btnReel').addEventListener('click', (e) => {
                e.preventDefault();
                openVideoModal(['glywinkOWK4'], 'popup');
            });

            fetch('proyectos.json')
                .then(response => response.json())
                .then(data => renderPortfolio(data))
                .catch(err => console.error('Error cargando proyectos:', err));
        });

        function renderPortfolio(projects) {
            projects.forEach(project => {
                const grid = document.getElementById(`grid-${project.categoria}`);
                if (!grid) return;

                const card = document.createElement('div');
                card.className = 'project-card';
                if (project.id === 'anda-calabaza-ficcion' || project.id === 'anda-calabaza-trailers') {
                    card.classList.add('title-shorten');
                }

                let detailsHtml = '';
                project.detalles.forEach(line => {
                    detailsHtml += `<p class="project-detail-line">${line}</p>`;
                });

                card.innerHTML = `
                    <div class="image-wrapper" data-id="${project.id}">
                        <img src="${project.imagen}" alt="${project.titulo}" loading="lazy">
                        ${project.tipo_enlace !== 'estatico' ? '<div class="play-overlay"></div>' : ''}
                    </div>
                    <h3 class="project-title">${project.titulo}</h3>
                    <div class="project-details">${detailsHtml}</div>
                `;

                const wrapper = card.querySelector('.image-wrapper');
                
                if (project.tipo_enlace === 'externo') {
                    wrapper.addEventListener('click', () => {
                        window.open(project.url_externa, '_blank');
                    });
                } else if (project.tipo_enlace === 'popup' || project.tipo_enlace === 'carrusel') {
                    wrapper.addEventListener('click', () => {
                        openVideoModal(project.videos, project.tipo_enlace, project.imagen);
                    });
                }

                grid.appendChild(card);
            });
        }

        function openVideoModal(videos, tipo, imagePath = '') {
            const modal = document.getElementById('videoModal');
            const prevBtn = document.getElementById('prevVideo');
            const nextBtn = document.getElementById('nextVideo');
            
            currentVideoList = videos || [];
            currentVideoIndex = 0;

            modal.classList.add('active');
            
            if (tipo === 'carrusel' && currentVideoList.length > 1) {
                prevBtn.style.display = 'block';
                nextBtn.style.display = 'block';
            } else {
                prevBtn.style.display = 'none';
                nextBtn.style.display = 'none';
            }

            loadModalState(tipo, imagePath);

            prevBtn.onclick = (e) => {
                e.stopPropagation();
                if (currentVideoIndex > 0) {
                    currentVideoIndex--;
                    loadModalState(tipo, imagePath);
                }
            };

            nextBtn.onclick = (e) => {
                e.stopPropagation();
                if (currentVideoIndex < currentVideoList.length - 1) {
                    currentVideoIndex++;
                    loadModalState(tipo, imagePath);
                }
            };

            const closeModal = () => {
                modal.classList.remove('active');
                document.getElementById('modalContent').innerHTML = '';
            };

            document.getElementById('modalClose').onclick = closeModal;
            modal.onclick = closeModal;
        }

        function loadModalState(tipo, imagePath) {
            const content = document.getElementById('modalContent');
            const videoId = currentVideoList[currentVideoIndex];
            
            if(imagePath) {
                content.innerHTML = `
                    <div class="video-trigger-container" style="background-image: url('${imagePath}');">
                        <div class="modal-play-btn"></div>
                    </div>
                `;
                const trigger = content.querySelector('.video-trigger-container');
                trigger.onclick = (e) => {
                    e.stopPropagation();
                    injectIframe(content, videoId);
                };
            } else {
                injectIframe(content, videoId);
            }
        }

        function injectIframe(container, videoId) {
            container.innerHTML = `
                <div class="iframe-container">
                    <iframe src="https://www.youtube.com/embed/${videoId}?autoplay=1" frameborder="0" allow="autoplay; encrypted-media" allowfullscreen></iframe>
                </div>
            `;
        }
    </script>
</body>
</html>
